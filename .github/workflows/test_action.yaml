name: Test actions
on: [push]

jobs:
  get-result:
   runs-on: ubuntu-latest
   name: Greet the user in Python
   steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Fetch result
      id: get_value
      uses: ./.github/actions/
      with:
       valor: "Israel"
    - name: Print result
      run: echo "${{ steps.get_value.outputs.result }}"   

